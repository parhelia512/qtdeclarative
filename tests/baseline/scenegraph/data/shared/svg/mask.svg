<svg viewBox="0 0 100 400" xmlns="http://www.w3.org/2000/svg">
<rect fill="blue" />
<mask id="myMask" x="0.7" y="0.2" width="0.6" height="0.6">
  <!-- Everything under a white pixel will be visible -->
  <circle cx="50" cy="50" r="50" fill="white" />
  <rect x="25" y="25" width="50" height="50" fill="black" />
  <!-- Everything under a black pixel will be invisible -->
</mask>
  <circle cx="0" cy="50" r="50" fill="purple"  mask="url(#myMask)" />
<!-- with this mask applied, we "punch" a heart shape hole into the circle -->
<circle cx="50" cy="150" r="50" fill="purple"/>
</svg>